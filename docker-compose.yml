services:
  db:
    image: postgres:18-alpine
    container_name: buygo-db
    environment:
      POSTGRES_USER: buygo
      POSTGRES_DB: buygo
      POSTGRES_PASSWORD: local-dev-password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: buygo-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db

  web:
    build:
      context: ../buygo-web
    container_name: buygo-web
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  postgres_data:
