syntax = "proto3";

package buygo.v1;

option go_package = "github.com/hatsubosi/buygo-api/api/v1;buygov1";

import "google/protobuf/timestamp.proto";
import "api/v1/auth.proto";

// --- Enums ---

// GroupBuyStatus represents the lifecycle of a group buy project.
enum GroupBuyStatus {
  GROUP_BUY_STATUS_UNSPECIFIED = 0;
  GROUP_BUY_STATUS_DRAFT = 1;
  GROUP_BUY_STATUS_ACTIVE = 2;
  GROUP_BUY_STATUS_ENDED = 3;
  GROUP_BUY_STATUS_ARCHIVED = 4;
}

// OrderItemStatus tracks the fulfillment progress of an order item.
// Progression: Unordered → Ordered → Arrived Overseas → Arrived Domestic → Ready for Pickup → Sent.
enum OrderItemStatus {
  ITEM_STATUS_UNSPECIFIED = 0;
  // User placed the item, not yet ordered from supplier.
  ITEM_STATUS_UNORDERED = 1;
  // Manager ordered from supplier.
  ITEM_STATUS_ORDERED = 2;
  // Item arrived at overseas warehouse.
  ITEM_STATUS_ARRIVED_OVERSEAS = 3;
  // Item arrived at domestic warehouse.
  ITEM_STATUS_ARRIVED_DOMESTIC = 4;
  // Item is ready for user pickup.
  ITEM_STATUS_READY_FOR_PICKUP = 5;
  // Item shipped to user or picked up.
  ITEM_STATUS_SENT = 6;
  // Item failed (out of stock, etc.).
  ITEM_STATUS_FAILED = 7;
}

// PaymentStatus tracks the payment verification state of an order.
enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  // No payment info submitted yet.
  PAYMENT_STATUS_UNSET = 1;
  // User uploaded payment proof.
  PAYMENT_STATUS_SUBMITTED = 2;
  // Manager confirmed the payment.
  PAYMENT_STATUS_CONFIRMED = 3;
  // Manager rejected the payment.
  PAYMENT_STATUS_REJECTED = 4;
}

// RoundingMethod defines how currency conversion results are rounded.
enum RoundingMethod {
  ROUNDING_METHOD_UNSPECIFIED = 0;
  ROUNDING_METHOD_FLOOR = 1;
  ROUNDING_METHOD_CEIL = 2;
  ROUNDING_METHOD_ROUND = 3;
}

// --- Service ---

// GroupBuyService manages group buying projects, products, orders, and pricing.
service GroupBuyService {
  // CreateGroupBuy creates a new group buy project.
  // Access: Creator / Admin
  rpc CreateGroupBuy(CreateGroupBuyRequest) returns (CreateGroupBuyResponse);

  // ListGroupBuys returns a paginated list of active group buys.
  // Access: Public
  rpc ListGroupBuys(ListGroupBuysRequest) returns (ListGroupBuysResponse);

  // ListManagerGroupBuys returns group buys managed by the current user.
  // Access: Manager
  rpc ListManagerGroupBuys(ListManagerGroupBuysRequest) returns (ListManagerGroupBuysResponse);

  // GetGroupBuy returns a group buy with its products.
  // Access: Public
  rpc GetGroupBuy(GetGroupBuyRequest) returns (GetGroupBuyResponse);

  // UpdateGroupBuy updates group buy details, status, products, and managers.
  // Access: Creator / Manager
  rpc UpdateGroupBuy(UpdateGroupBuyRequest) returns (UpdateGroupBuyResponse);

  // AddProduct adds a product with specs to a group buy.
  // Access: Creator / Manager
  rpc AddProduct(AddProductRequest) returns (AddProductResponse);

  // CreateCategory creates a product category template.
  // Access: Creator
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);

  // ListCategories returns all product categories.
  // Access: Public
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);

  // CreateOrder places a new order in a group buy.
  // Access: Authenticated
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);

  // CancelOrder cancels an order (only if all items are still unordered).
  // Access: Order Owner
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);

  // GetMyGroupBuyOrder returns the current user's order for a specific group buy.
  // Access: Authenticated
  rpc GetMyGroupBuyOrder(GetMyGroupBuyOrderRequest) returns (GetMyGroupBuyOrderResponse);

  // UpdateOrder modifies order items (only if all items are still unordered).
  // Access: Order Owner
  rpc UpdateOrder(UpdateOrderRequest) returns (UpdateOrderResponse);

  // UpdatePaymentInfo submits or updates payment proof for an order.
  // Access: Order Owner
  rpc UpdatePaymentInfo(UpdatePaymentInfoRequest) returns (UpdatePaymentInfoResponse);

  // GetMyOrders returns all orders placed by the current user.
  // Access: Authenticated
  rpc GetMyOrders(GetMyOrdersRequest) returns (GetMyOrdersResponse);

  // BatchUpdateStatus performs FIFO batch status progression on order items.
  // Processes oldest items first, updating up to `count` items matching the spec.
  // Access: Manager
  rpc BatchUpdateStatus(BatchUpdateStatusRequest) returns (BatchUpdateStatusResponse);

  // ConfirmPayment approves or rejects a user's payment.
  // Access: Manager
  rpc ConfirmPayment(ConfirmPaymentRequest) returns (ConfirmPaymentResponse);

  // ListGroupBuyOrders returns all orders for a group buy.
  // Access: Manager
  rpc ListGroupBuyOrders(ListGroupBuyOrdersRequest) returns (ListGroupBuyOrdersResponse);

  // CreatePriceTemplate creates a reusable pricing template.
  // Access: Admin
  rpc CreatePriceTemplate(CreatePriceTemplateRequest) returns (CreatePriceTemplateResponse);

  // ListPriceTemplates returns all pricing templates.
  // Access: Admin
  rpc ListPriceTemplates(ListPriceTemplatesRequest) returns (ListPriceTemplatesResponse);

  // GetPriceTemplate returns a single pricing template.
  // Access: Admin
  rpc GetPriceTemplate(GetPriceTemplateRequest) returns (GetPriceTemplateResponse);

  // UpdatePriceTemplate updates a pricing template.
  // Access: Admin
  rpc UpdatePriceTemplate(UpdatePriceTemplateRequest) returns (UpdatePriceTemplateResponse);

  // DeletePriceTemplate deletes a pricing template.
  // Access: Admin
  rpc DeletePriceTemplate(DeletePriceTemplateRequest) returns (DeletePriceTemplateResponse);
}

// --- Messages ---

// ShippingType defines available shipping/pickup methods.
enum ShippingType {
  SHIPPING_TYPE_UNSPECIFIED = 0;
  SHIPPING_TYPE_DELIVERY = 1;
  SHIPPING_TYPE_STORE_PICKUP = 2;
  SHIPPING_TYPE_MEETUP = 3;
}

// ShippingConfig defines a shipping option with its pricing.
message ShippingConfig {
  string id = 1;
  string name = 2;
  ShippingType type = 3;
  // Shipping fee in the smallest currency unit (e.g. cents).
  int64 price = 4;
}

// GroupBuy represents a group buying project.
message GroupBuy {
  string id = 1;
  string title = 2;
  string description = 3;
  string cover_image_url = 4;
  GroupBuyStatus status = 5;

  // Exchange rate from source currency to target currency.
  double exchange_rate = 13;
  RoundingConfig rounding_config = 14;
  // Source currency code (e.g. "JPY", "USD").
  string source_currency = 15;

  google.protobuf.Timestamp created_at = 6;
  // Order deadline — no new orders accepted after this time.
  google.protobuf.Timestamp deadline = 7;

  User creator = 8;
  repeated User managers = 9;

  reserved 10; // payment_methods

  repeated ShippingConfig shipping_configs = 12;
}

// Product represents a purchasable item within a group buy.
message Product {
  string id = 1;
  string group_buy_id = 2;
  string name = 3;
  string description = 4;
  string image_url = 5;

  // Original price in source currency (smallest unit).
  int64 price_original = 6;
  double exchange_rate = 7;
  RoundingConfig rounding_config = 8;
  // Final price after currency conversion and rounding (calculated server-side).
  int64 price_final = 9;

  // Total available quantity (0 = unlimited).
  int32 max_quantity = 10;
  // Product variants/options.
  repeated ProductSpec specs = 11;
}

// RoundingConfig specifies how to round currency conversion results.
message RoundingConfig {
  RoundingMethod method = 1;
  // Rounding digit: 0 = ones place, 1 = tens place, 2 = hundreds place.
  int32 digit = 2;
}

// PriceTemplate is a reusable pricing configuration for group buys.
message PriceTemplate {
  string id = 1;
  string name = 2;
  string source_currency = 3;
  double exchange_rate = 4;
  RoundingConfig rounding_config = 5;
}

// ProductSpec represents a variant/option of a product (e.g. size, color).
message ProductSpec {
  string id = 1;
  string name = 2;
}

// --- Request/Response ---

message CreateGroupBuyRequest {
  string title = 1;
  string description = 2;
  reserved 3; // payment_methods
  repeated Product products = 4;
  string cover_image_url = 5;
  google.protobuf.Timestamp deadline = 6;
  repeated ShippingConfig shipping_configs = 7;
  repeated string manager_ids = 8;
  double exchange_rate = 9;
  RoundingConfig rounding_config = 10;
  string source_currency = 11;
}

message CreateGroupBuyResponse {
  GroupBuy group_buy = 1;
}

message ListGroupBuysRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListGroupBuysResponse {
  repeated GroupBuy group_buys = 1;
  string next_page_token = 2;
}

message GetGroupBuyRequest {
  string group_buy_id = 1;
}

message GetGroupBuyResponse {
  GroupBuy group_buy = 1;
  repeated Product products = 2;
}

// Order represents a user's order within a group buy.
message Order {
  string id = 1;
  string group_buy_id = 2;
  string user_id = 3;
  // Total amount in target currency (smallest unit).
  int64 total_amount = 4;

  PaymentStatus payment_status = 5;
  PaymentInfo payment_info = 6;

  // Sensitive fields — only visible to order owner and managers.
  string contact_info = 7;
  string shipping_address = 8;
  string note = 12;

  repeated OrderItem items = 9;

  string shipping_method_id = 10;
  int64 shipping_fee = 11;
}

// OrderItem represents a single line item in an order.
message OrderItem {
  string id = 1;
  string product_id = 2;
  string spec_id = 3;
  int32 quantity = 4;
  OrderItemStatus status = 5;

  // Snapshot fields — captured at order time for display consistency.
  string product_name = 6;
  string spec_name = 7;
  // Unit price at the time of order.
  int64 price = 8;
}

// PaymentInfo contains the payment proof submitted by the user.
message PaymentInfo {
  // Payment method description (e.g. "bank transfer", "LINE Pay").
  string method = 1;
  // Last 5 digits of the payment account for verification.
  string account_last5 = 2;
  google.protobuf.Timestamp paid_at = 3;
  // Payment amount in target currency (smallest unit).
  int64 amount = 4;
}

message CreateOrderRequest {
  string group_buy_id = 1;
  repeated CreateOrderItem items = 2;
  string contact_info = 3;
  string shipping_address = 4;
  string shipping_method_id = 5;
  string note = 6;
}

message UpdateGroupBuyRequest {
  string group_buy_id = 1;
  GroupBuyStatus status = 2;
  string title = 3;
  string description = 4;
  repeated Product products = 5;
  string cover_image_url = 6;
  google.protobuf.Timestamp deadline = 7;
  double exchange_rate = 12;
  RoundingConfig rounding_config = 13;
  string source_currency = 14;
  reserved 8; // payment_methods

  repeated ShippingConfig shipping_configs = 10;
  repeated string manager_ids = 11;
}

message UpdateGroupBuyResponse {
  GroupBuy group_buy = 1;
}

message AddProductRequest {
  string group_buy_id = 1;
  string name = 2;
  int64 price_original = 3;
  double exchange_rate = 4;
  RoundingConfig rounding_config = 5;
  // Spec name strings to create as ProductSpec entries.
  repeated string specs = 6;
}

message AddProductResponse {
  Product product = 1;
}

// Category is a product category template with predefined spec names.
message Category {
  string id = 1;
  string name = 2;
  // Predefined spec names for products in this category.
  repeated string spec_names = 3;
}

message CreateCategoryRequest {
  string name = 1;
  repeated string spec_names = 2;
}

message CreateCategoryResponse {
  Category category = 1;
}

message ListCategoriesRequest {}

message ListCategoriesResponse {
  repeated Category categories = 1;
}

message ListGroupBuyOrdersRequest {
  string group_buy_id = 1;
}

message ListGroupBuyOrdersResponse {
  repeated Order orders = 1;
}

message ListManagerGroupBuysRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListManagerGroupBuysResponse {
  repeated GroupBuy group_buys = 1;
  string next_page_token = 2;
}

// CreateOrderItem specifies an item to include when creating or updating an order.
message CreateOrderItem {
  string product_id = 1;
  string spec_id = 2;
  int32 quantity = 3;
  OrderItemStatus status = 4;
}

message CreateOrderResponse {
  string order_id = 1;
}

message CancelOrderRequest {
  string order_id = 1;
}

message CancelOrderResponse {
  string order_id = 1;
  OrderItemStatus status = 2;
}

message GetMyGroupBuyOrderRequest {
  string group_buy_id = 1;
}

message GetMyGroupBuyOrderResponse {
  // The user's order for this group buy, or null if none exists.
  Order order = 1;
}

message UpdateOrderRequest {
  string order_id = 1;
  // Full replacement list of order items.
  repeated CreateOrderItem items = 2;
  string note = 3;
}

message UpdateOrderResponse {
  Order order = 1;
}

message UpdatePaymentInfoRequest {
  string order_id = 1;
  string method = 2;
  string account_last5 = 3;
  string contact_info = 4;
  string shipping_address = 5;
  google.protobuf.Timestamp paid_at = 6;
  int64 amount = 7;
}

message UpdatePaymentInfoResponse {
  Order order = 1;
}

message GetMyOrdersRequest {}

message GetMyOrdersResponse {
  repeated Order orders = 1;
}

// BatchUpdateStatusRequest triggers FIFO batch status progression.
// The system finds the oldest `count` items matching `spec_id` with status < `target_status`,
// and advances them to `target_status`.
message BatchUpdateStatusRequest {
  string group_buy_id = 1;
  // Filter by product spec.
  string spec_id = 2;
  // Target status to advance items to.
  OrderItemStatus target_status = 3;
  // Number of items to process (oldest first).
  int32 count = 4;
}

message BatchUpdateStatusResponse {
  // Actual number of items updated.
  int32 updated_count = 1;
  // Order IDs affected, for UI feedback.
  repeated string updated_order_ids = 2;
}

message ConfirmPaymentRequest {
  string order_id = 1;
  // Must be CONFIRMED or REJECTED.
  PaymentStatus status = 2;
}

message ConfirmPaymentResponse {
  string order_id = 1;
  PaymentStatus status = 2;
}

// --- Price Template ---

message CreatePriceTemplateRequest {
  string name = 1;
  string source_currency = 2;
  double exchange_rate = 3;
  RoundingConfig rounding_config = 4;
}

message CreatePriceTemplateResponse {
  PriceTemplate template = 1;
}

message ListPriceTemplatesRequest {}

message ListPriceTemplatesResponse {
  repeated PriceTemplate templates = 1;
}

message GetPriceTemplateRequest {
  string template_id = 1;
}

message GetPriceTemplateResponse {
  PriceTemplate template = 1;
}

message UpdatePriceTemplateRequest {
  string template_id = 1;
  string name = 2;
  string source_currency = 3;
  double exchange_rate = 4;
  RoundingConfig rounding_config = 5;
}

message UpdatePriceTemplateResponse {
  PriceTemplate template = 1;
}

message DeletePriceTemplateRequest {
  string template_id = 1;
}

message DeletePriceTemplateResponse {
  string template_id = 1;
}
