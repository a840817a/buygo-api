syntax = "proto3";

package buygo.v1;

option go_package = "github.com/hatsubosi/buygo-api/api/v1;buygov1";

import "google/protobuf/timestamp.proto";
import "api/v1/auth.proto";

// --- Enums ---

enum GroupBuyStatus {
  GROUP_BUY_STATUS_UNSPECIFIED = 0;
  GROUP_BUY_STATUS_DRAFT = 1;
  GROUP_BUY_STATUS_ACTIVE = 2;
  GROUP_BUY_STATUS_ENDED = 3;
  GROUP_BUY_STATUS_ARCHIVED = 4;
}

enum OrderItemStatus {
  ITEM_STATUS_UNSPECIFIED = 0;
  ITEM_STATUS_UNORDERED = 1; // User placed, not yet bought from supplier
  ITEM_STATUS_ORDERED = 2;   // Manager ordered from supplier
  ITEM_STATUS_ARRIVED_OVERSEAS = 3;
  ITEM_STATUS_ARRIVED_DOMESTIC = 4;
  ITEM_STATUS_READY_FOR_PICKUP = 5;
  ITEM_STATUS_SENT = 6;      // Shipped to user / Picked up
  ITEM_STATUS_FAILED = 7;    // Out of stock etc.
}

enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  PAYMENT_STATUS_UNSET = 1;
  PAYMENT_STATUS_SUBMITTED = 2; // User uploaded proof
  PAYMENT_STATUS_CONFIRMED = 3; // Manager confirmed
  PAYMENT_STATUS_REJECTED = 4;
}

enum RoundingMethod {
  ROUNDING_METHOD_UNSPECIFIED = 0;
  ROUNDING_METHOD_FLOOR = 1;
  ROUNDING_METHOD_CEIL = 2;
  ROUNDING_METHOD_ROUND = 3;
}

// --- Service ---

service GroupBuyService {
  // GroupBuy Management (Creator/Admin)
  rpc CreateGroupBuy(CreateGroupBuyRequest) returns (CreateGroupBuyResponse);
  rpc ListGroupBuys(ListGroupBuysRequest) returns (ListGroupBuysResponse);
  rpc ListManagerGroupBuys(ListManagerGroupBuysRequest) returns (ListManagerGroupBuysResponse);
  rpc GetGroupBuy(GetGroupBuyRequest) returns (GetGroupBuyResponse);
  rpc UpdateGroupBuy(UpdateGroupBuyRequest) returns (UpdateGroupBuyResponse);
  
  // Product Management (Creator/Admin)
  rpc AddProduct(AddProductRequest) returns (AddProductResponse);
  
  // Category (Template) Methods
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
  
  // Order Management (User)
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetMyGroupBuyOrder(GetMyGroupBuyOrderRequest) returns (GetMyGroupBuyOrderResponse);
  rpc UpdateOrder(UpdateOrderRequest) returns (UpdateOrderResponse);
  rpc UpdatePaymentInfo(UpdatePaymentInfoRequest) returns (UpdatePaymentInfoResponse);
  rpc GetMyOrders(GetMyOrdersRequest) returns (GetMyOrdersResponse);

  // Order Management (Manager)
  // Batch update status of items (FIFO)
  rpc BatchUpdateStatus(BatchUpdateStatusRequest) returns (BatchUpdateStatusResponse);
  // Confirm user payment
  // Confirm user payment
  rpc ConfirmPayment(ConfirmPaymentRequest) returns (ConfirmPaymentResponse);

  // Manager: List Orders for a GroupBuy
  rpc ListGroupBuyOrders(ListGroupBuyOrdersRequest) returns (ListGroupBuyOrdersResponse);

  // Price Templates (Admin Only)
  rpc CreatePriceTemplate(CreatePriceTemplateRequest) returns (CreatePriceTemplateResponse);
  rpc ListPriceTemplates(ListPriceTemplatesRequest) returns (ListPriceTemplatesResponse);
  rpc GetPriceTemplate(GetPriceTemplateRequest) returns (GetPriceTemplateResponse);
  rpc UpdatePriceTemplate(UpdatePriceTemplateRequest) returns (UpdatePriceTemplateResponse);
  rpc DeletePriceTemplate(DeletePriceTemplateRequest) returns (DeletePriceTemplateResponse);
}

// --- Messages ---

enum ShippingType {
  SHIPPING_TYPE_UNSPECIFIED = 0;
  SHIPPING_TYPE_DELIVERY = 1;
  SHIPPING_TYPE_STORE_PICKUP = 2;
  SHIPPING_TYPE_MEETUP = 3;
}

message ShippingConfig {
  string id = 1;
  string name = 2;
  ShippingType type = 3;
  int64 price = 4;
}

message GroupBuy {
  string id = 1;
  string title = 2;
  string description = 3;
  string cover_image_url = 4;
  GroupBuyStatus status = 5;

  double exchange_rate = 13;
  RoundingConfig rounding_config = 14;
  string source_currency = 15; // New field

  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp deadline = 7;

  User creator = 8;
  repeated User managers = 9;

  reserved 10; // payment_methods

  repeated ShippingConfig shipping_configs = 12; // New structured config
}

message Product {
  string id = 1;
  string group_buy_id = 2;
  string name = 3;
  string description = 4;
  string image_url = 5;

  int64 price_original = 6;
  double exchange_rate = 7;
  RoundingConfig rounding_config = 8;
  int64 price_final = 9; // Calculated

  int32 max_quantity = 10; // Total available
  repeated ProductSpec specs = 11;
}

message RoundingConfig {
  RoundingMethod method = 1;
  int32 digit = 2; // 0=ones, 1=tens
}

message PriceTemplate {
  string id = 1;
  string name = 2;
  string source_currency = 3;
  double exchange_rate = 4;
  RoundingConfig rounding_config = 5;
}

message ProductSpec {
  string id = 1;
  string name = 2;
}

// --- Request/Response ---

message CreateGroupBuyRequest {
  string title = 1;
  string description = 2;
  reserved 3; // payment_methods
  repeated Product products = 4;
  string cover_image_url = 5;
  google.protobuf.Timestamp deadline = 6;
  repeated ShippingConfig shipping_configs = 7;
  repeated string manager_ids = 8;
  double exchange_rate = 9;
  RoundingConfig rounding_config = 10;
  string source_currency = 11;
}

message CreateGroupBuyResponse {
  GroupBuy group_buy = 1;
}

message ListGroupBuysRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListGroupBuysResponse {
  repeated GroupBuy group_buys = 1;
  string next_page_token = 2;
}

message GetGroupBuyRequest {
  string group_buy_id = 1;
}

message GetGroupBuyResponse {
  GroupBuy group_buy = 1;
  repeated Product products = 2;
}

message Order {
  string id = 1;
  string group_buy_id = 2;
  string user_id = 3;
  int64 total_amount = 4;

  PaymentStatus payment_status = 5;
  PaymentInfo payment_info = 6;

  // Sensitive Info (Manager/Owner Only)
  string contact_info = 7;
  string shipping_address = 8;
  string note = 12;

  repeated OrderItem items = 9;

  string shipping_method_id = 10;
  int64 shipping_fee = 11;
}

message OrderItem {
  string id = 1;
  string product_id = 2;
  string spec_id = 3;
  int32 quantity = 4;
  OrderItemStatus status = 5;
  
  // Snapshot fields for display
  string product_name = 6;
  string spec_name = 7;
  int64 price = 8;
}

message PaymentInfo {
    string method = 1;
    string account_last5 = 2;
    google.protobuf.Timestamp paid_at = 3;
    int64 amount = 4;
}

message CreateOrderRequest {
  string group_buy_id = 1;
  repeated CreateOrderItem items = 2;
  // User can set payment/shipping later or now
  string contact_info = 3;
  string shipping_address = 4;
  string shipping_method_id = 5;
  string note = 6;
}

message UpdateGroupBuyRequest {
  string group_buy_id = 1;
  GroupBuyStatus status = 2;
  string title = 3;
  string description = 4;
  repeated Product products = 5;
  string cover_image_url = 6;
  google.protobuf.Timestamp deadline = 7;
  double exchange_rate = 12;
  RoundingConfig rounding_config = 13;
  string source_currency = 14; // New field
  reserved 8; // payment_methods

  repeated ShippingConfig shipping_configs = 10;
  repeated string manager_ids = 11;
}

message UpdateGroupBuyResponse {
  GroupBuy group_buy = 1;
}

message AddProductRequest {
  string group_buy_id = 1;
  string name = 2;
  int64 price_original = 3;
  double exchange_rate = 4;
  RoundingConfig rounding_config = 5;
  // Specs strings
  repeated string specs = 6;
}

message AddProductResponse {
  Product product = 1;
}

// Category Messages
message Category {
  string id = 1;
  string name = 2;
  repeated string spec_names = 3;
}

message CreateCategoryRequest {
  string name = 1;
  repeated string spec_names = 2;
}

message CreateCategoryResponse {
  Category category = 1;
}

message ListCategoriesRequest {}

message ListCategoriesResponse {
  repeated Category categories = 1;
}

message ListGroupBuyOrdersRequest {
  string group_buy_id = 1;
}

message ListGroupBuyOrdersResponse {
  repeated Order orders = 1;
}

message ListManagerGroupBuysRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListManagerGroupBuysResponse {
  repeated GroupBuy group_buys = 1;
  string next_page_token = 2;
}

message CreateOrderItem {
    string product_id = 1;
    string spec_id = 2;
    int32 quantity = 3;
    OrderItemStatus status = 4;
}

message CreateOrderResponse {
  string order_id = 1;
}

message CancelOrderRequest {
  string order_id = 1;
}

message CancelOrderResponse {
  string order_id = 1;
  OrderItemStatus status = 2; // e.g. ITEM_STATUS_FAILED (Cancelled)
}

// User: Edit existing order items (only if UNORDERED)
message GetMyGroupBuyOrderRequest {
  string group_buy_id = 1;
}

message GetMyGroupBuyOrderResponse {
  Order order = 1; // Nullable if none
}

message UpdateOrderRequest {
    string order_id = 1;
    repeated CreateOrderItem items = 2; // Replacement list
    string note = 3;
}

message UpdateOrderResponse {
    Order order = 1;
}

// User: Update payment info
message UpdatePaymentInfoRequest {
    string order_id = 1;
    string method = 2;
    string account_last5 = 3;
    // User might update shipping/contact here too?
    string contact_info = 4;
    string shipping_address = 5;
    google.protobuf.Timestamp paid_at = 6;
    int64 amount = 7;
}

message UpdatePaymentInfoResponse {
    Order order = 1;
}

message GetMyOrdersRequest {}

message GetMyOrdersResponse {
  repeated Order orders = 1;
}

message BatchUpdateStatusRequest {
  string group_buy_id = 1;
  string spec_id = 2;
  OrderItemStatus target_status = 3;
  int32 count = 4; // Number of items to progress (FIFO)
}

message BatchUpdateStatusResponse {
  int32 updated_count = 1;
  repeated string updated_order_ids = 2; // For UI feedback
}

message ConfirmPaymentRequest {
    string order_id = 1;
    PaymentStatus status = 2; // CONFIRMED or REJECTED
}

message ConfirmPaymentResponse {
    string order_id = 1;
    PaymentStatus status = 2;
}

// Price Template Requests
message CreatePriceTemplateRequest {
  string name = 1;
  string source_currency = 2;
  double exchange_rate = 3;
  RoundingConfig rounding_config = 4;
}

message CreatePriceTemplateResponse {
  PriceTemplate template = 1;
}

message ListPriceTemplatesRequest {}

message ListPriceTemplatesResponse {
  repeated PriceTemplate templates = 1;
}

message GetPriceTemplateRequest {
  string template_id = 1;
}

message GetPriceTemplateResponse {
  PriceTemplate template = 1;
}

message UpdatePriceTemplateRequest {
  string template_id = 1;
  string name = 2;
  string source_currency = 3;
  double exchange_rate = 4;
  RoundingConfig rounding_config = 5;
}

message UpdatePriceTemplateResponse {
  PriceTemplate template = 1;
}

message DeletePriceTemplateRequest {
  string template_id = 1;
}

message DeletePriceTemplateResponse {
  string template_id = 1;
}
