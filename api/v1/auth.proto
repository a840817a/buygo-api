syntax = "proto3";

package buygo.v1;

option go_package = "github.com/hatsubosi/buygo-api/api/v1;buygov1";

// User roles for role-based access control.
enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  // Regular user — can browse, place orders, and register for events.
  USER_ROLE_USER = 1;
  // Creator — can create and manage group buys and events.
  USER_ROLE_CREATOR = 2;
  // System administrator — full platform access including user management.
  USER_ROLE_SYS_ADMIN = 3;
}

// AuthService handles user authentication and user management.
service AuthService {
  // Login exchanges a Firebase ID token for a backend JWT.
  // Access: Public
  rpc Login(LoginRequest) returns (LoginResponse);

  // ListUsers returns a paginated list of all users.
  // Access: Admin only
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // UpdateUserRole changes a user's role.
  // Access: Admin only
  rpc UpdateUserRole(UpdateUserRoleRequest) returns (UpdateUserRoleResponse);

  // GetMe returns the currently authenticated user's profile.
  // Access: Authenticated
  rpc GetMe(GetMeRequest) returns (GetMeResponse);

  // ListAssignableManagers returns users eligible to be assigned as managers (Creator or SysAdmin).
  // Access: Creator / Admin
  rpc ListAssignableManagers(ListAssignableManagersRequest) returns (ListAssignableManagersResponse);
}

// User represents a platform user account.
message User {
  string id = 1;
  string name = 2;
  string email = 3;
  string photo_url = 4;
  UserRole role = 5;
}

message LoginRequest {
  // Firebase ID token obtained from client-side authentication.
  string id_token = 1;
}

message LoginResponse {
  // Backend JWT for subsequent API calls.
  string access_token = 1;
  User user = 2;
}

message ListUsersRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  string next_page_token = 2;
}

message UpdateUserRoleRequest {
  string user_id = 1;
  UserRole role = 2;
}

message UpdateUserRoleResponse {
  User user = 1;
}

message GetMeRequest {}

message GetMeResponse {
  User user = 1;
}

message ListAssignableManagersRequest {
  // Optional search filter by name or email.
  string query = 1;
}

message ListAssignableManagersResponse {
  repeated User managers = 1;
}
