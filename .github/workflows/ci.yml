name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify dependencies
        run: go mod verify

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: |
          pkgs=()
          while IFS= read -r pkg; do
            pkgs+=("$pkg")
          done < <(go list ./... | grep -v '/api/v1' | grep -v '/api/v1/buygov1connect')
          go test -race -coverprofile=coverage.out "${pkgs[@]}"

      - name: Coverage gate
        run: bash scripts/check-coverage.sh 50

      - name: Run gosec
        run: gosec -exclude-dir=api/v1 ./...

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Build
        run: go build ./cmd/server

  buf-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          breaking: true
          breaking_against: '.git#branch=main'

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t buygo-api .
